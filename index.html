<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Minha Landing Page</h1>

    <nav>
        <a href="#inicio">Início</a>
        <a href="#planos">Planos</a>
        <a href="#contato">Contato</a>
    </nav>
</header>

<section id="inicio">
    <h2>Bem-vindo!</h2>
</section>

<section id="planos">
    <h2>Tabela de Planos</h2>

    <table>
        <tr>
            <th>Plano</th>
            <th>Preço</th>
            <th>Benefícios</th>
        </tr>

        <tr>
            <td>Básico</td>
            <td>R$ 49,90</td>
            <td>Acesso Inicial</td>
        </tr>

        <tr>
            <td>Intermediário</td>
            <td>R$ 99,90</td>
            <td>Suporte Prioritário</td>
        </tr>

        <tr>
            <td>Premium</td>
            <td>R$ 149,90</td>
            <td>Todos os Recursos</td>
        </tr>

    </table>
</section>

<section id="contato">

<h2>Formulário de Contato</h2>

<form id="formulario">

<label>Nome:</label>
<input type="text" id="nome">

<label>E-mail:</label>
<input type="email" id="email">

<label>Mensagem:</label>
<textarea id="mensagem"></textarea>

<button type="submit">Enviar</button>

</form>

</section>

<footer>
    <p>© 2026 - Landing Page</p>
</footer>

<script src="script.js"></script>

</body>
</html>
